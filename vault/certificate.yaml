apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-cert
  namespace: vault
spec:
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  subject:
    organizations:
    - home
  secretName: vault-tls
  dnsNames:
  - vault
  - vault.vault
  - vault.vault.svc
  - vault.vault.svc.cluster.local
  - vault-0.vault-internal
  - vault-1.vault-internal
  - vault-2.vault-internal
  ipAddresses:
  - 127.0.0.1
  privateKey:
    rotationPolicy: Always
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
