global:
  enabled: true
  tlsDisable: false
  namespace: vault
injector:
  enabled: false
  metrics:
    enabled: true
  logLevel: info
  logFormat: "json"
csi:
  enabled: false
server:
  image:
    repository: "hashicorp/vault"
    tag: "1.21.2"
  logLevel: info
  logFormat: json
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 256Mi
      cpu: 250m
  extraEnvironmentVars:
    VAULT_CACERT: /vault/userconfig/vault-ha-tls/ca.crt
    VAULT_TLSCERT: /vault/userconfig/vault-ha-tls/tls.crt
    VAULT_TLSKEY: /vault/userconfig/vault-ha-tls/tls.key
  volumes:
  - name: vault-ha-tls
    secret:
      defaultMode: 420
      secretName: vault-tls
  volumeMounts:
  - mountPath: /vault/userconfig/vault-ha-tls
    name: vault-ha-tls
    readOnly: true
  standalone:
    enabled: true
    config: |-
      cluster_name = "vault"
      ui = true
      listener "tcp" {
        tls_disable = 0
        address = "[::]:8200"
        cluster_address = "[::]:8201"
        tls_cert_file = "/vault/userconfig/vault-ha-tls/tls.crt"
        tls_key_file  = "/vault/userconfig/vault-ha-tls/tls.key"
        tls_client_ca_file = "/vault/userconfig/vault-ha-tls/ca.crt"
      }

      storage "raft" {
        path = "/vault/data"
      }

      telemetry {
        prometheus_retention_time = "30s"
        disable_hostname = true
      }
  readinessProbe:
    enabled: true
    path: /v1/sys/health?standbyok=true
    port: 8200
    failureThreshold: 2
    nitialDelaySeconds: 5
    periodSeconds: 5
    successThreshold: 1
    timeoutSeconds: 3
  ha:
    enabled: false
  affinity: ""
  dataStorage:
    enabled: true
    size: 10Gi
    mountPath: "/vault/data"
    storageClass: local-path
    accessMode: ReadWriteOnce
  ingress:
    enabled: false
