apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-config
  namespace: production
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend-production
    kind: SecretStore
  target:
    name: app-config
    creationPolicy: Owner
  data:
  # From database secret
  - secretKey: db_password
    remoteRef:
      key: database
      property: password
  # From API keys
  - secretKey: stripe_key
    remoteRef:
      key: api-keys
      property: stripe_key