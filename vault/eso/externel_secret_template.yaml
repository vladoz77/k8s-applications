apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: database-connection
  namespace: production
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-backend-production
    kind: SecretStore
  target:
    name: database-connection
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Create connection string
        connection_string: |
          postgresql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/production
        # Create JSON config
        config.json: |
          {
            "database": {
              "host": "{{ .host }}",
              "port": {{ .port }},
              "username": "{{ .username }}",
              "password": "{{ .password }}",
              "ssl": true
            }
          }
  data:
  - secretKey: username
    remoteRef:
      key: database
      property: username
  - secretKey: password
    remoteRef:
      key: database
      property: password
  - secretKey: host
    remoteRef:
      key: database
      property: host
  - secretKey: port
    remoteRef:
      key: database
      property: port